aid: defense-health-agency
name: Defense Health Agency
url: >-
  https://raw.githubusercontent.com/api-evangelist/defense-health-agency/refs/heads/main/apis.yml
description: >-
  The Defense Health Agency (DHA) is a joint, integrated combat support agency
  that enables the Army, Navy, and Air Force medical services to provide a
  medically ready force and ready medical force to combatant commands. DHA
  operates the Military Health System (MHS), MHS Genesis electronic health
  record, the Military Health System Data Repository (MDR), and the Enterprise
  Intelligence and Data Solutions (EIDS) program. Data exchange inside MHS
  Genesis uses SMART on FHIR APIs, but DHA does not currently publish a
  general-purpose public developer API.
