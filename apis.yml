    name: MHS Genesis SMART on FHIR API
    description: >-
      MHS Genesis, the Department of Defense electronic health record built on
      Oracle Health (Cerner), exposes a SMART on FHIR interface for
      authorized clinical applications to read and write patient data. Access
      is restricted to vetted application partners and DoD beneficiaries.
